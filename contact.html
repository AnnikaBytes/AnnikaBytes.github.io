<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Annika's Website — Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
  <style>
    form {
      display: grid;
      gap: 1.5rem;
      text-align: left;
    }

    label {
      font-family: var(--font-sans);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      padding: 1rem;
      font-family: var(--font-serif);
      font-size: 1rem;
      background: transparent;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--fg);
    }

    button {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 1rem 2rem;
      font-family: var(--font-sans);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <nav class="navbar" aria-label="Primary">
    <a href="index.html" class="logo">Annika Yaworski</a>
    <ul class="nav-list">
      <li><a href="index.html">About</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>

  <main>
    <header class="hero">
      <h1 class="script-text">Get in Touch</h1>
      <p class="caps-label">LET'S START A CONVERSATION</p>
    </header>

    <section class="contact-section" style="max-width: 600px; margin: 0 auto;">
      <div class="client-block">
        <form id="contact-form" aria-label="Contact form">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required />
          </div>

          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
          </div>

          <button type="submit">Send Message</button>
        </form>
        <p class="caps-label" style="font-size: 0.6rem; margin-top: 1.5rem; text-align: center;">
          This will open your email app with a pre-filled message.
        </p>
      </div>
    </section>
  </main>

  <footer>
    © 2025 Annika's Website • All Rights Reserved
  </footer>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      const to = 'annika.yaworski@gmail.com'; // Added based on context if available or placeholder
      const name = document.getElementById('name').value.trim();
      const from = document.getElementById('email').value.trim();
      const msg = document.getElementById('message').value.trim();

      const subject = encodeURIComponent('Contact from ' + name);
      const body = encodeURIComponent(
        'Name: ' + name + '\n'
        + 'Email: ' + from + '\n\n'
        + msg
      );

      window.location.href = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
    });
  </script>
</body>

</html>
